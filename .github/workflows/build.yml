name: Build Vulkan Wrapper (Mali)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Compile libvulkan_wrapper.so
        run: |
          NDK=${{ steps.ndk.outputs.ndk-path }}
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android
          API=24
          CC=$TOOLCHAIN/bin/$TARGET$API-clang
          CFLAGS="-fPIC -O2 -Wall -Iinclude -I$NDK/sources/third_party/vulkan/src/include"
          $CC $CFLAGS -c wrapper.c -o wrapper.o
          $CC -shared -o libvulkan_wrapper.so wrapper.o

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libvulkan_wrapper
          path: libvulkan_wrapper.so
