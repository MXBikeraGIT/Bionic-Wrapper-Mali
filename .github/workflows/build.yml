name: Build Vulkan Wrapper (Mali)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
  
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Compile libvulkan_wrapper.so
        run: |
          NDK=${{ steps.ndk.outputs.ndk-path }}
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android
          API=24
          CC=$TOOLCHAIN/bin/$TARGET$API-clang
          CFLAGS="-fPIC -Iinclude -I$NDK/sources/third_party/vulkan/src/include"
          mkdir -p build
          for src in src/*.c; do
            obj=build/$(basename ${src%.c}).o
            $CC $CFLAGS -c $src -o $obj
          done
          $CC -shared -o libvulkan_wrapper.so build/*.o
          file libvulkan_wrapper.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libvulkan-wrapper
          path: libvulkan_wrapper.so
